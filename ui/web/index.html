<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Box: Local Verdict</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='4' fill='%230a0e17'/%3E%3Cpath d='M8 8h16v16H8z' fill='none' stroke='%2300f5ff' stroke-width='2'/%3E%3Ccircle cx='16' cy='16' r='4' fill='%2300f5ff'/%3E%3C/svg%3E">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <div id="app" class="app-layout">
        <!-- ============================================================
             Top Navigation Bar
             ============================================================ -->
        <nav class="navbar" role="navigation" aria-label="主导航">
            <div class="navbar-brand">
                <span class="navbar-logo">THE BOX</span>
            </div>

            <div class="navbar-menu">
                <button class="nav-btn" id="btn-case-briefing" title="查看案件资料">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                        <polyline points="10 9 9 9 8 9"/>
                    </svg>
                    <span>案件资料</span>
                </button>
                <button class="nav-btn" id="btn-generate" title="生成新案件">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <use href="assets/icons/generate.svg#icon"/>
                    </svg>
                    <span>生成案件</span>
                </button>
                <button class="nav-btn" id="btn-save" title="存档管理">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <use href="assets/icons/save.svg#icon"/>
                    </svg>
                    <span>存档</span>
                </button>
                <button class="nav-btn" id="btn-settings" title="设置">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <use href="assets/icons/settings.svg#icon"/>
                    </svg>
                    <span>设置</span>
                </button>
                <button class="nav-btn nav-btn-ending" id="btn-ending" title="查看结算" style="display:none;">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
                    </svg>
                    <span>结算</span>
                </button>
            </div>
        </nav>

        <!-- ============================================================
             Main Content Area
             ============================================================ -->
        <main class="app-main">
            <!-- ========================================================
                 Left Sidebar - Suspect Panel
                 ======================================================== -->
            <aside class="sidebar-left" role="complementary" aria-label="嫌疑人信息">
                <!-- Suspect Selector -->
                <div class="suspect-selector-wrapper" style="padding: var(--space-4);">
                    <select class="suspect-selector" id="suspect-selector" aria-label="选择嫌疑人" disabled>
                        <option value="" disabled selected>选择嫌疑人...</option>
                    </select>
                </div>

                <!-- Suspect Card -->
                <div class="suspect-card" id="suspect-card">
                    <div class="suspect-header">
                        <div class="suspect-avatar-wrapper">
                            <div class="suspect-avatar-placeholder" id="suspect-avatar">
                                ?
                            </div>
                            <span class="suspect-status-badge ready" id="suspect-status">就绪</span>
                        </div>
                        <div class="suspect-info">
                            <h2 class="suspect-name" id="suspect-name">未选择</h2>
                            <p class="suspect-role" id="suspect-role">--</p>
                        </div>
                    </div>

                    <div class="suspect-pressure-section">
                        <div class="pressure-label">
                            <span class="pressure-title">压力值</span>
                            <span class="pressure-value low" id="pressure-value">0%</span>
                        </div>
                        <div class="pressure-bar-container">
                            <div class="pressure-bar low" id="pressure-bar" style="width: 0%;"></div>
                        </div>
                    </div>

                    <div class="action-buttons">
                        <button class="btn-action btn-pressure" id="btn-pressure" disabled>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <use href="assets/icons/pressure.svg#icon"/>
                            </svg>
                            <span>施压</span>
                        </button>
                        <button class="btn-action btn-empathy" id="btn-empathy" disabled>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <use href="assets/icons/empathy.svg#icon"/>
                            </svg>
                            <span>共情</span>
                        </button>
                    </div>
                </div>
            </aside>

            <!-- ========================================================
                 Center - Chat Area
                 ======================================================== -->
            <section class="chat-area" role="main" aria-label="审讯对话">
                <header class="chat-header">
                    <h1 class="chat-title" id="chat-title">审讯室</h1>
                </header>

                <!-- Chat Messages Container -->
                <div class="chat-container" id="chat-container" role="log" aria-live="polite" aria-label="对话记录">
                    <!-- System Message Placeholder -->
                    <div class="message message-system">
                        <div class="message-content">
                            选择嫌疑人开始审讯...
                        </div>
                    </div>
                </div>

                <!-- Chat Input Area -->
                <div class="chat-input-area">
                    <input
                        type="text"
                        class="chat-input"
                        id="chat-input"
                        placeholder="输入你的问题..."
                        autocomplete="off"
                        aria-label="输入消息"
                        disabled
                    >
                    <button class="btn-send" id="btn-send" disabled>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <use href="assets/icons/send.svg#icon"/>
                        </svg>
                    </button>
                </div>

                <!-- Timer Bar -->
                <div class="timer-bar">
                    <span class="timer-label">剩余时间</span>
                    <span class="timer-display" id="timer-display">--</span>
                </div>
            </section>

            <!-- ========================================================
                 Right Sidebar - Evidence Panel
                 ======================================================== -->
            <aside class="sidebar-right" role="complementary" aria-label="证据面板">
                <header class="sidebar-right-header">
                    <h2 class="sidebar-right-title">证据</h2>
                </header>

                <div class="evidence-list" id="evidence-list" role="list" aria-label="证据列表">
                    <p class="evidence-empty" id="evidence-empty">暂无证据</p>
                    <!-- Evidence cards will be dynamically added here -->
                </div>
            </aside>
        </main>

        <!-- ============================================================
             Loading Overlay
             ============================================================ -->
        <div class="loading-overlay" id="loading-overlay" role="alert" aria-busy="true" aria-live="assertive">
            <div class="loading-spinner-wrapper">
                <div class="spinner"></div>
                <div class="spinner-ring"></div>
                <div class="spinner-inner"></div>
            </div>
            <p class="loading-text" id="loading-text">正在处理...</p>
            <p class="loading-status" id="loading-status">已等待 0s</p>
            <button class="loading-cancel-btn" id="loading-cancel">取消</button>
        </div>

        <!-- ============================================================
             Modal Container
             ============================================================ -->
        <div class="modal-backdrop" id="modal-backdrop"></div>
        <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
            <header class="modal-header">
                <h3 class="modal-title" id="modal-title">提示</h3>
                <button class="modal-close" id="modal-close" aria-label="关闭">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 6L6 18M6 6l12 12"/>
                    </svg>
                </button>
            </header>
            <div class="modal-body" id="modal-body">
                <!-- Modal content will be dynamically inserted -->
            </div>
            <footer class="modal-footer" id="modal-footer">
                <!-- Modal buttons will be dynamically inserted -->
            </footer>
        </div>

        <!-- ============================================================
             Toast Container
             ============================================================ -->
        <div class="toast-container" id="toast-container" aria-live="polite"></div>
    </div>

    <!-- QWebChannel Bridge Script (provided by PySide6) -->
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>

    <!-- Application JavaScript Modules (order matters: bridge first, app last) -->
    <script src="js/bridge.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/suspect.js"></script>
    <script src="js/evidence.js"></script>
    <script src="js/timer.js"></script>
    <script src="js/loading.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/keyboard.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
